# wez-sidebar configuration
# Copy to ~/.config/wez-sidebar/config.toml and customize.
# All values are optional; defaults are used when omitted.

# --------------------------------------------------------------------------
# Terminal Backend
# --------------------------------------------------------------------------
# "wezterm" (default) or "tmux"
# backend = "wezterm"

# Terminal CLI binary path (auto-detected if omitted).
# When wez-sidebar is launched directly by WezTerm (without a shell),
# `which wezterm` may fail due to limited PATH. Set the full path explicitly.
# terminal_path = "/opt/homebrew/bin/wezterm"

# Legacy field (still works): equivalent to terminal_path for wezterm backend
# wezterm_path = "/opt/homebrew/bin/wezterm"

# Session stale threshold in minutes (default: 30)
# stale_threshold_mins = 30

# Data directory for sessions.json and usage-cache.json (default: ~/.config/wez-sidebar)
# data_dir = "~/.config/wez-sidebar"

# --------------------------------------------------------------------------
# Desktop Notifications (macOS)
# --------------------------------------------------------------------------
# When a Claude Code session enters "waiting_input" (permission prompt),
# a desktop notification is sent via terminal-notifier.
#
# Install: brew install terminal-notifier
#
# - Clicking the notification body -> focuses the terminal pane
# - If terminal-notifier is not installed, notifications are silently skipped.

# --------------------------------------------------------------------------
# Orphan Process Reaper
# --------------------------------------------------------------------------
# Automatically kills orphaned Claude Code processes that are no longer
# attached to any terminal pane and have been running longer than the threshold.
#
# Safety: skipped when terminal is not running; uses SIGTERM only (no SIGKILL).
# Manual use: wez-sidebar reap --dry (preview) / wez-sidebar reap (kill)
#
# [reaper]
# enabled = false
# threshold_hours = 3

# --------------------------------------------------------------------------
# Kanban Mode
# --------------------------------------------------------------------------
# Kanban view groups sessions by status (Active / Review / Done).
# Tasks (CLI-managed via `wez-sidebar tasks add`) drive the kanban lifecycle.
#
# auto_flat_threshold: below this session count, the UI stays flat even in
#   kanban-capable layouts. Set to 0 to force kanban whenever tasks exist.
#
# block_alert_minutes: a task in "review" longer than this fires a macOS
#   notification via terminal-notifier. Set to 0 to disable block alerts.
#
# auto_approve: skip the review column — tasks move straight from running
#   to done on Stop hook (Cline Kanban style auto pipeline).
#
# block_alert_sound: terminal-notifier sound name (matches `-sound`).
#
# block_alert_cooldown_secs: minimum seconds between repeat alerts for the
#   same task. 0 = alert at most once per review stint (reset when the task
#   leaves review).

# [kanban]
# auto_flat_threshold = 3
# block_alert_minutes = 5
# auto_approve = false
# block_alert_sound = "Basso"
# block_alert_cooldown_secs = 0
